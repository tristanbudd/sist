name: Deploy to Production

on:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      cd /var/www/sist

                      # 1. Force Git to match GitHub
                      git fetch origin main
                      git reset --hard origin/main

                      # 2. Find paths for pnpm and node
                      export PATH=$PATH:/home/$(whoami)/.local/share/pnpm:/home/$(whoami)/.nvm/versions/node/$(node -v)/bin:/usr/local/bin

                      # 3. Install PHP dependencies
                      composer install --no-dev --optimize-autoloader --no-interaction

                      # 4. Use the absolute pnpm if available, else fallback
                      PNPM_BIN=$(which pnpm || echo "pnpm")
                      $PNPM_BIN install --frozen-lockfile
                      $PNPM_BIN run build

                      # 5. Laravel Housekeeping
                      php artisan migrate --force
                      php artisan config:cache
                      php artisan route:cache
                      php artisan view:cache

                      # 6. Generate Documentation
                      php artisan scribe:generate

                      # 7. Permissions
                      sudo -n /usr/bin/chgrp -R www-data storage bootstrap/cache
                      sudo -n /usr/bin/chmod -R ug+rwx storage bootstrap/cache
