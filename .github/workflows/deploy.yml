name: Deploy to Production

on:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      cd /var/www/sist

                      # 1. Force Git to match GitHub (Wipes local server changes)
                      git fetch origin main
                      git reset --hard origin/main

                      # 2. Ensure pnpm is in the PATH (Standard Ubuntu pnpm path)
                      export PNPM_HOME="$HOME/.local/share/pnpm"
                      export PATH="$PNPM_HOME:$PATH"

                      # 3. Install PHP dependencies
                      composer install --no-dev --optimize-autoloader --no-interaction

                      # 4. Install Node dependencies and Build assets
                      pnpm install --frozen-lockfile
                      pnpm run build

                      # 5. Laravel Housekeeping
                      php8.3 artisan migrate --force
                      php8.3 artisan config:cache
                      php8.3 artisan route:cache
                      php8.3 artisan view:cache

                      # 6. Ensure permissions
                      sudo -n chgrp -R www-data storage bootstrap/cache
                      sudo -n chmod -R ug+rwx storage bootstrap/cache
